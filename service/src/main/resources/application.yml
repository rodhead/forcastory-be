spring:
  datasource:
    url: jdbc:postgresql://localhost:5430/forcastory_app
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration/shared
    default-schema: public

app:
  dev-mode:
    enabled: true

server:
  port: 8181
