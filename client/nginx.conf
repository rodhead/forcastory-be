# ============================================
# NGINX Configuration for Item Service UI
# Gateway Route: /itemservice/ui
# ============================================

worker_processes  auto;
pid               /home/app/nginx/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Log to stdout/stderr for container visibility
  access_log /dev/stdout;
  error_log  /dev/stderr warn;

  # Performance optimizations
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  etag on;
  if_modified_since exact;
  server_tokens off;  # Hide NGINX version

  # Gzip compression for better performance
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain text/css text/javascript application/javascript
    application/json application/manifest+json application/xml
    application/rss+xml image/svg+xml font/ttf font/otf application/font-woff
    application/vnd.ms-fontobject application/x-font-ttf application/x-font-opentype;

  # Cache policy based on file type
  # - Assets (JS/CSS/fonts/images): 1 year, immutable
  # - index.html: no-store (always fresh for SPA routing)
  # - Other files: 1 hour
  map $uri $cache_control {
    "~*^/itemservice/ui/assets/.*\.(?:js|mjs|css|map|png|jpe?g|gif|svg|webp|ico|ttf|otf|woff2?)$" "public, max-age=31536000, immutable";
    "~*^/itemservice/ui/index\.html$"                                                              "no-store";
    default                                                                                        "public, max-age=3600";
  }

  # Content Security Policy for XSS protection
  map $uri $content_security_policy {
    default "default-src 'self'; img-src 'self' data: blob:; \
             style-src 'self' 'unsafe-inline'; font-src 'self' data:; \
             script-src 'self' 'unsafe-inline' 'unsafe-eval'; \
             connect-src 'self' https:; \
             frame-ancestors 'self'; base-uri 'self'; form-action 'self';";
  }

  server {
    listen 8080;
    listen [::]:8080;
    charset utf-8;

    # Document root - static files are under /usr/share/nginx/html/itemservice/ui/
    root  /usr/share/nginx/html;
    index index.html;

    # ==========================================
    # Health Check Endpoint (for k8s/docker)
    # ==========================================
    location /health {
      access_log off;
      default_type application/json;
      add_header Content-Type "application/json; charset=utf-8" always;
      add_header X-Content-Type-Options "nosniff" always;
      return 200 '{"status":"UP","message":"Service is running"}\n';
    }

    location /itemservice/ui/health {
      access_log off;
      default_type application/json;
      add_header Content-Type "application/json; charset=utf-8" always;
      add_header X-Content-Type-Options "nosniff" always;
      return 200 '{"status":"UP","message":"Service is running","service":"itemservice-ui","timestamp":"$time_iso8601","hostname":"$hostname"}\n';
    }

    # ==========================================
    # Static Assets (JS, CSS, fonts, images)
    # ==========================================
    location ^~ /itemservice/ui/assets/ {
      try_files $uri =404;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Cache-Control $cache_control always;
    }

    # ==========================================
    # SPA Routing (React Router)
    # All /itemservice/ui/* requests fallback to index.html
    # ==========================================
    location ^~ /itemservice/ui/ {
      try_files $uri $uri/ /itemservice/ui/index.html;
      add_header Cache-Control $cache_control always;
    }

    # ==========================================
    # Root redirect
    # ==========================================
    location = / {
      return 301 /itemservice/ui/;
    }

    # ==========================================
    # Security Headers (applied to all responses)
    # ==========================================
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $content_security_policy always;
    add_header Cache-Control $cache_control always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; # enable if HTTPS upstream

  }
}